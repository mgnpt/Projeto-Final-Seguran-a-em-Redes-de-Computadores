<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>SecureChat — Entrar</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>

<div class="bg-grid"></div>

<div class="page">

    <div class="brand">
        <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            </svg>
        </div>
        <span>SecureChat</span>
    </div>

    <div class="card">

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" id="tabLogin" onclick="mostrarTab('login')">Entrar</button>
            <button class="tab" id="tabSignup" onclick="mostrarTab('signup')">Criar conta</button>
        </div>

        <!-- Mensagem de erro/sucesso -->
        <div id="msgBox" class="msg-box" style="display:none"></div>

        <!-- LOGIN -->
        <div id="formLogin" class="form-section">
            <div class="form-group">
                <label for="loginId">ID de utilizador</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="loginId" placeholder="ex: user#1234" autocomplete="off" />
                </div>
            </div>
            <div class="form-group">
                <label for="loginPass">Palavra-passe</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input type="password" id="loginPass" placeholder="Palavra-passe" />
                    <button type="button" class="toggle-pass" onclick="togglePass('loginPass', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn-primary" onclick="fazerLogin()">Entrar</button>
        </div>

        <!-- SIGN UP -->
        <div id="formSignup" class="form-section" style="display:none">
            <div class="form-group">
                <label for="signupNome">Nome de utilizador</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                    </svg>
                    <input type="text" id="signupNome" placeholder="O teu nome" autocomplete="off" />
                </div>
                <span class="field-hint">O teu ID será gerado automaticamente</span>
            </div>
            <div class="form-group">
                <label for="signupPass">Palavra-passe</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input type="password" id="signupPass" placeholder="Escolhe uma palavra-passe" oninput="avaliarPassword(this.value)" />
                    <button type="button" class="toggle-pass" onclick="togglePass('signupPass', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
                <div class="password-strength">
                    <div class="strength-bar"><div id="strengthFill" class="strength-fill"></div></div>
                    <span id="strengthLabel" class="strength-label"></span>
                </div>
            </div>
            <div class="form-group">
                <label for="signupPassConf">Confirmar palavra-passe</label>
                <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                    </svg>
                    <input type="password" id="signupPassConf" placeholder="Repete a palavra-passe" />
                    <button type="button" class="toggle-pass" onclick="togglePass('signupPassConf', this)">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button class="btn-primary" onclick="fazerSignup()">Criar conta</button>
        </div>

    </div>

    <p class="footer-note">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
        </svg>
        Comunicação cifrada de ponta a ponta
    </p>

</div>

<script src="login.js"></script>
</body>
</html>
