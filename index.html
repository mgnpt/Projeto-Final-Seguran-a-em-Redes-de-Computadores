<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Modal criar grupo -->
<div id="modalOverlay" class="modal-overlay" style="display:none">
    <div class="modal">
        <h3>Criar Grupo</h3>
        <input type="text" id="nomeGrupo" placeholder="Nome do grupo">
        <p class="modal-label">Membros:</p>
        <div id="membrosList">
            <label><input type="checkbox" value="Goncalo"> Goncalo</label>
            <label><input type="checkbox" value="Lara"> Lara</label>
            <label><input type="checkbox" value="Isaura"> Isaura</label>
        </div>
        <div class="modal-actions">
            <button onclick="fecharModal()">Cancelar</button>
            <button onclick="criarGrupo()">Criar</button>
        </div>
    </div>
</div>

<!-- Painel de info (chat direto) -->
<div id="infoPainelChat" class="info-painel" style="display:none">
    <div class="info-painel-inner">
        <button class="info-fechar" onclick="fecharInfoPainel()">&#x2715;</button>
        <div class="info-avatar" id="infoAvatar"></div>
        <div class="info-nome" id="infoNome"></div>
        <div class="info-estado" id="infoEstado"></div>
        <div class="info-section-label">Sobre</div>
        <div class="info-sobre" id="infoSobre"></div>
    </div>
</div>

<!-- Painel de info (grupo) -->
<div id="infoPainelGrupo" class="info-painel" style="display:none">
    <div class="info-painel-inner">
        <button class="info-fechar" onclick="fecharInfoPainel()">&#x2715;</button>
        <div class="info-avatar grupo-avatar" id="infoGrupoAvatar">&#128101;</div>
        <div class="info-nome" id="infoGrupoNome"></div>
        <div class="info-section-label">Descricao</div>
        <div class="info-descricao-wrap">
            <textarea id="infoGrupoDescricao" class="info-descricao" placeholder="Adiciona uma descricao ao grupo..."></textarea>
            <button class="btn-guardar-desc" onclick="guardarDescricao()">Guardar</button>
        </div>
        <div class="info-section-label">Membros</div>
        <div id="infoGrupoMembros" class="info-membros-lista"></div>
        <div class="info-section-label">Ficheiros partilhados</div>
        <div id="infoGrupoFicheiros" class="info-ficheiros-lista"></div>
        <button class="btn-sair-grupo" onclick="sairDoGrupo()">&#x1F6AA; Sair do grupo</button>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <h3>Conversas</h3>
        <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <input type="text" id="searchInput" placeholder="Pesquisar..." oninput="pesquisar(this.value)">
            <button id="searchClear" class="search-clear" onclick="limparPesquisa()" style="display:none">&#x2715;</button>
        </div>
        <div class="conversation" data-nome="Goncalo">Goncalo</div>
        <div class="conversation" data-nome="Lara">Lara</div>
        <div class="conversation" data-nome="Isaura">Isaura</div>

        <div class="sidebar-section">
            <span>Grupos</span>
            <button id="criarGrupoBtn" onclick="abrirModal()">+</button>
        </div>
        <div id="listaGrupos"></div>

        <!-- Rodapé do utilizador -->
        <div class="sidebar-footer">
            <div class="sidebar-footer-avatar" id="footerAvatar"></div>
            <div class="sidebar-footer-info">
                <span class="sidebar-footer-nome" id="footerNome">Utilizador</span>
                <span class="sidebar-footer-id" id="footerId"></span>
            </div>
            <button class="btn-logout" onclick="fazerLogout()" title="Sair">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
            </button>
        </div>
    </div>

    <div class="chat">
        <div class="chat-header" id="chatHeader">
            <span id="chatHeaderNome">Nenhuma conversa selecionada</span>
            <button id="infoBtn" class="btn-info" onclick="abrirInfoPainel()" style="display:none" title="Informacoes">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="8.5"/>
                    <line x1="12" y1="11" x2="12" y2="16"/>
                </svg>
            </button>
        </div>
        <div class="messages" id="messages">
            <p class="no-chat">Seleciona uma conversa para comecar</p>
        </div>
        <div class="input-area">
            <button id="attachBtn" onclick="document.getElementById('fileInput').click()" disabled>&#128206;</button>
            <input type="file" id="fileInput" style="display:none">
            <input type="text" id="msgInput" placeholder="Escreve uma mensagem..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
