<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Chat</title>
    <link rel="stylesheet" href="style.css">
    <script src="index.js"></script>
</head>
<body>
<div class="container">
     <!-- Chat atual-->
    <div class="sidebar">
        <h3>Conversas</h3>
        <div class="conversation">Gonçalo</div>
        <div class="conversation">Lara</div>
        <div class="conversation">Isaura</div>
        <div class="conversation">Grupo Projeto</div>
    </div>
    <!-- Chat -->
    <div class="chat">
        <div class="chat-header" id="chatHeader">
            Nenhuma conversa selecionada
        </div>
        <div class="messages" id="messages">
            <p class="no-chat">Seleciona uma conversa para começar</p>
        </div>
        <div class="input-area">
            <button id="attachBtn" onclick="document.getElementById('fileInput').click()" disabled>📎</button>
            <input type="file" id="fileInput" style="display:none">
            <input type="text" id="msgInput" placeholder="Escreve uma mensagem..." disabled>
            <button id="sendBtn" onclick="sendMessage()" disabled>Enviar</button>
        </div>
    </div>
</div>
</body>
</html>
